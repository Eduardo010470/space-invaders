<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPACE INVADERS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden;user-select:none}
#header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;width:480px;max-width:95vw;padding:4px 0}
.hud{color:#0ff;font-size:12px;text-shadow:0 0 8px #0ff;font-weight:bold}
#lives{color:#f0f;text-shadow:0 0 8px #f0f}
#lvl{color:#ff0;text-shadow:0 0 8px #ff0}
#pwr{color:#7fffd4;text-shadow:0 0 8px #7fffd4}
canvas{display:block;border:2px solid #0ff;box-shadow:0 0 20px #0ff;background:#000;max-width:95vw}
#mobile-controls{display:flex;gap:12px;margin-top:8px}
.mbtn{background:rgba(0,255,255,0.1);border:2px solid #0ff;color:#0ff;font-size:18px;width:70px;height:70px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px #0ff;touch-action:manipulation}
.mbtn:active{background:rgba(0,255,255,0.4)}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:10;gap:14px;padding:12px}
#overlay h1{color:#0ff;font-size:22px;text-shadow:0 0 20px #0ff;text-align:center;line-height:1.8}
#overlay p{color:#ff0;font-size:11px;text-align:center;line-height:2}
.btn{background:transparent;border:2px solid #0ff;color:#0ff;font-family:monospace;font-size:12px;padding:12px 20px;cursor:pointer;text-shadow:0 0 8px #0ff;box-shadow:0 0 10px #0ff}
.btn:active{background:#0ff;color:#000}
.lb{border:1px solid #0ff;box-shadow:0 0 10px #0ff;padding:8px 12px;min-width:230px;background:rgba(0,255,255,0.08)}
.lb h3{color:#0ff;text-align:center;font-size:12px;margin-bottom:6px;text-shadow:0 0 8px #0ff}
.lb ol{color:#fff;font-size:11px;line-height:1.6;padding-left:18px}
.lb li{display:flex;justify-content:space-between;gap:10px}
.lb span{color:#ff0}
.level-flash{font-size:40px !important;letter-spacing:2px;color:#ff0 !important;text-shadow:0 0 20px #ff0 !important}
</style>
</head>
<body>
<div id="header">
<div class="hud" id="sc">SCORE: 0</div>
<div class="hud" id="hi">HI: 0</div>
<div class="hud" id="lvl">LVL: 1</div>
<div class="hud" id="lives">VIDAS: 3</div>
<div class="hud" id="pwr">PWR: -</div>
</div>
<div style="position:relative">
<canvas id="c" width="480" height="480"></canvas>
<div id="overlay"></div>
</div>
<div id="mobile-controls">
<button class="mbtn" id="lb">&#9664;</button>
<button class="mbtn" id="fb">&#9679;</button>
<button class="mbtn" id="rb">&#9654;</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let score=0,lives=3,level=1,running=false,animId;
let player,bullets,invaders,ebullets,shields,ufo,powerups;
let idir=1,itimer=0,idelay=40,keys={},fpress=false,fcool=0,exps=[],fc=0,utimer=0;
let victoryTimer=0,introAnimId=0,introAliens=[],introStars=[];
const HS_KEY='space_invaders_high_score';
const LB_KEY='space_invaders_top10';
const POWERUP_SPAWN_PROBABILITY=0.24;
const POWERUP_DURATION_FRAMES=520;
const SHIELD_HIT_DEPLETION=90;
const VICTORY_ANIMATION_FRAMES=90;
const VICTORY_TONE={freq:520,dur:0.18,vol:0.12,slide:840};
let highScore=parseInt(localStorage.getItem(HS_KEY)||'0',10)||0;
let leaderboard=loadLeaderboard();
const GAME_OVER_DELAY_MS=140;
const MARCH_BASE_DELAY=16,MARCH_MIN_DELAY=5,MARCH_TOTAL_INVADERS=55,MARCH_SPEED_STEP=4;
let ac,master,marchStep=0,marchClock=0,ufoOsc,ufoGain;
const canUseVibration=typeof navigator!=='undefined'&&typeof navigator.vibrate==='function'&&window.isSecureContext;
let vibrationEnabled=false;

function loadLeaderboard(){
try{
const parsed=JSON.parse(localStorage.getItem(LB_KEY)||'[]');
if(!Array.isArray(parsed))return [];
return parsed.filter(r=>r&&Number.isFinite(r.score)).sort((a,b)=>b.score-a.score).slice(0,10);
}catch{return [];}
}

function saveLeaderboard(){localStorage.setItem(LB_KEY,JSON.stringify(leaderboard));}

function recordLeaderboard(points){
if(points<=0)return;
leaderboard.push({score:points,date:new Date().toLocaleDateString('pt-BR')});
leaderboard=leaderboard.sort((a,b)=>b.score-a.score).slice(0,10);
saveLeaderboard();
}

function leaderboardHTML(){
const rows=leaderboard.length
?leaderboard.map((r,i)=>`<li><span>#${i+1} ${r.date||''}</span><strong>${r.score}</strong></li>`).join('')
:'<li><span>Sem registros</span><strong>---</strong></li>';
return `<div class="lb"><h3>TOP 10</h3><ol>${rows}</ol></div>`;
}

function renderStartOverlay(){
const o=document.getElementById('overlay');
o.style.display='flex';
o.innerHTML='<h1>SPACE<br>INVADERS</h1>'+
'<p>ROSA=30pts | VERDE=20pts | AMARELO=10pts<br>OVNI=100-300pts BONUS</p>'+
'<p>TECLADO: SETAS + ESPACO<br>CELULAR: BOTOES ABAIXO</p>'+
leaderboardHTML()+
'<button class="btn" onclick="startGame()">INICIAR</button>';
}

function renderEndOverlay(isVictory){
const o=document.getElementById('overlay');
o.style.display='flex';
o.innerHTML='<h1 style="color:'+(isVictory?'#0ff':'#f00')+'">'+(isVictory?'VITÓRIA!':'GAME<br>OVER')+
'</h1><p style="color:#0ff">PONTUACAO: <span style="color:#ff0">'+score+'</span><br>RECORDE: <span style="color:#ff0">'+highScore+'</span></p>'+
leaderboardHTML()+'<button class="btn" onclick="startGame()">JOGAR NOVAMENTE</button>';
}

function showLevelTransition(nextLevel,onDone){
const o=document.getElementById('overlay');
o.style.display='flex';
o.innerHTML='<h1 class="level-flash">LEVEL '+nextLevel+'</h1>';
setTimeout(()=>{
o.style.display='none';
if(onDone)onDone();
},1200);
}

function startIntroAnimation(){
stopIntroAnimation();
introAliens=[];
introStars=Array.from({length:55},()=>({x:Math.random()*480,y:Math.random()*480,s:Math.random()*2+1}));
for(let r=0;r<4;r++)for(let c=0;c<7;c++)introAliens.push({x:70+c*48,y:-240+r*44,t:r<1?3:r<2?2:1});
let tick=0;
const loop=()=>{
if(running)return;
introAnimId=requestAnimationFrame(loop);
tick++;
ctx.clearRect(0,0,480,480);
ctx.fillStyle='#0f0';ctx.fillRect(0,470,480,2);
introStars.forEach(st=>{ctx.globalAlpha=0.2+Math.sin((tick+st.x)*0.04)*0.15;ctx.fillStyle='#0ff';ctx.fillRect(st.x,st.y,st.s,st.s);});
ctx.globalAlpha=1;
const drop=Math.min(160,tick*0.65);
introAliens.forEach((inv,idx)=>{
const y=inv.y+drop+(idx%3)*4*Math.sin((tick+idx)*0.06);
const x=inv.x+Math.sin((tick+idx)*0.02)*2;
ctx.shadowBlur=6;
if(inv.t===3){ctx.fillStyle='#f0f';ctx.shadowColor='#f0f';}
else if(inv.t===2){ctx.fillStyle='#0f0';ctx.shadowColor='#0f0';}
else{ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';}
ctx.fillRect(x+4,y,20,4);ctx.fillRect(x,y+4,28,8);ctx.fillRect(x+4,y+12,6,4);ctx.fillRect(x+18,y+12,6,4);
ctx.shadowBlur=0;
});
};
loop();
}

function stopIntroAnimation(){if(introAnimId){cancelAnimationFrame(introAnimId);introAnimId=0;}}

function initAudio(){
if(!ac){
ac=new (window.AudioContext||window.webkitAudioContext)();
master=ac.createGain();master.gain.value=0.22;master.connect(ac.destination);
}
if(ac.state==='suspended')ac.resume();
enableVibration();
}

function playTone(type,freq,dur,vol,slide){
if(!ac||!master)return;
const t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
o.type=type;o.frequency.setValueAtTime(freq,t);
if(slide)o.frequency.linearRampToValueAtTime(slide,t+dur);
g.gain.setValueAtTime(0.0001,t);
g.gain.exponentialRampToValueAtTime(vol,t+0.01);
g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.02);
}

function playNoise(dur,vol){
if(!ac||!master)return;
dur=Math.max(0.03,dur||0);
const t=ac.currentTime,bufferLength=Math.max(1,Math.floor(ac.sampleRate*dur)),buf=ac.createBuffer(1,bufferLength,ac.sampleRate);
const d=buf.getChannelData(0);
for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
const s=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
s.buffer=buf;f.type='highpass';f.frequency.value=350;
g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
s.connect(f);f.connect(g);g.connect(master);s.start(t);s.stop(t+dur);
}

function playShoot(){playTone('square',880,0.08,0.08,520);}
function playExplosion(){playNoise(0.14,0.18);playTone('triangle',190,0.12,0.06,90);}
function playPlayerDeath(){playTone('sawtooth',260,0.3,0.1,70);playNoise(0.22,0.14);}
function playGameOver(){playTone('triangle',220,0.24,0.09,140);setTimeout(()=>playTone('triangle',170,0.35,0.09,90),GAME_OVER_DELAY_MS);}
function playMarch(){
const seq=[180,220,260,220];
playTone('square',seq[marchStep%seq.length],0.06,0.04);
marchStep++;
}

function startUfoSound(){
if(!ac||!master||ufoOsc)return;
const t=ac.currentTime;
ufoOsc=ac.createOscillator();ufoGain=ac.createGain();
ufoOsc.type='sawtooth';ufoOsc.frequency.setValueAtTime(720,t);ufoOsc.frequency.linearRampToValueAtTime(460,t+0.6);
ufoGain.gain.setValueAtTime(0.0001,t);ufoGain.gain.linearRampToValueAtTime(0.05,t+0.05);ufoGain.gain.linearRampToValueAtTime(0.0001,t+0.65);
ufoOsc.connect(ufoGain);ufoGain.connect(master);ufoOsc.start(t);ufoOsc.stop(t+0.7);
ufoOsc.onended=()=>{ufoOsc=null;ufoGain=null;};
}

function enableVibration(){
if(!canUseVibration||vibrationEnabled)return;
vibrationEnabled=true;
navigator.vibrate(0);
}
function vibrate(pattern){if(vibrationEnabled&&canUseVibration)navigator.vibrate(pattern);}
function vibrateShoot(){vibrate(50);}
function vibrateDeath(){vibrate(200);}
function vibrateGameOver(){vibrate([100,50,100]);}
function saveHighScore(){localStorage.setItem(HS_KEY,String(highScore));}
function addScore(points){
score+=points;
if(score>highScore){highScore=score;saveHighScore();}
updateHUD();
}

function spawnPowerUp(inv){
if(Math.random()>POWERUP_SPAWN_PROBABILITY)return;
const type=Math.random()<0.5?'double':'shield';
powerups.push({x:inv.x+10,y:inv.y+8,w:12,h:12,type,vy:1.7});
}

function activatePowerUp(type){
if(type==='double')player.doubleTimer=Math.max(player.doubleTimer,POWERUP_DURATION_FRAMES);
if(type==='shield')player.shieldTimer=Math.max(player.shieldTimer,POWERUP_DURATION_FRAMES);
exps.push({x:player.x+18,y:player.y+10,life:18,c:type==='double'?'#0ff':'#7fffd4'});
}

function startGame(){
stopIntroAnimation();
document.getElementById('overlay').style.display='none';
score=0;lives=3;level=1;idelay=40;victoryTimer=0;
initAudio();updateHUD();
initLevel();running=true;gameLoop();
}

function initLevel(){
player={x:220,y:440,w:36,h:20,doubleTimer:0,shieldTimer:0};
bullets=[];ebullets=[];exps=[];ufo=null;powerups=[];
idir=1;itimer=0;idelay=Math.max(8,40-(level-1)*5);
invaders=[];
for(let r=0;r<5;r++)for(let c=0;c<11;c++)
invaders.push({x:40+c*38,y:50+r*38,w:28,h:20,t:r<1?3:r<3?2:1,alive:true,f:0});
shields=[];
for(let s=0;s<4;s++){
const sx=50+s*105,sh=[];
for(let bx=0;bx<14;bx++)for(let by=0;by<8;by++){
if(by===0&&(bx<2||bx>11))continue;
if(by>=5&&bx>=4&&bx<=9)continue;
sh.push({x:sx+bx*6,y:380+by*6,alive:true});
}
shields.push(sh);
}
updateHUD();
}

function updateHUD(){
document.getElementById('sc').textContent='SCORE: '+score;
document.getElementById('hi').textContent='HI: '+highScore;
document.getElementById('lvl').textContent='LVL: '+level;
document.getElementById('lives').textContent='VIDAS: '+'♥'.repeat(lives);
const powers=[];
if(player?.doubleTimer>0)powers.push('2X');
if(player?.shieldTimer>0)powers.push('SHIELD');
document.getElementById('pwr').textContent='PWR: '+(powers.length?powers.join(' | '):'-');
}

function gameLoop(){
if(!running)return;
animId=requestAnimationFrame(gameLoop);fc++;
ctx.clearRect(0,0,480,480);
ctx.fillStyle='#0f0';ctx.fillRect(0,470,480,2);

if(player.doubleTimer>0||player.shieldTimer>0){
if(player.doubleTimer>0)player.doubleTimer--;
if(player.shieldTimer>0)player.shieldTimer--;
if(fc%10===0)updateHUD();
}

if(victoryTimer===0){
if(keys['ArrowLeft']||keys['a'])player.x=Math.max(0,player.x-4);
if(keys['ArrowRight']||keys['d'])player.x=Math.min(444,player.x+4);
if(fcool>0)fcool--;
const maxBullets=player.doubleTimer>0?6:3;
if((keys[' ']||fpress)&&fcool===0&&bullets.length<maxBullets){
if(player.doubleTimer>0){
bullets.push({x:player.x+9,y:player.y});
bullets.push({x:player.x+23,y:player.y});
fcool=10;
}else{
bullets.push({x:player.x+16,y:player.y});
fcool=15;
}
playShoot();vibrateShoot();
}
}

bullets=bullets.filter(b=>b.y>-10);
bullets.forEach(b=>b.y-=8);
ebullets=ebullets.filter(b=>b.y<480);
ebullets.forEach(b=>b.y+=3+level*0.5);
powerups=powerups.filter(p=>p.y<500);
powerups.forEach(p=>p.y+=p.vy);

itimer++;
const alive=invaders.filter(i=>i.alive);
if(victoryTimer===0&&alive.length>0){
marchClock++;
const marchDelay=Math.max(MARCH_MIN_DELAY,MARCH_BASE_DELAY-Math.floor((MARCH_TOTAL_INVADERS-alive.length)/MARCH_SPEED_STEP));
if(marchClock>=marchDelay){marchClock=0;playMarch();}
}
if(victoryTimer===0&&itimer>=idelay){
itimer=0;let edge=false;
alive.forEach(i=>{i.x+=8*idir;i.f=1-i.f;if(i.x<=0||i.x+i.w>=480)edge=true;});
if(edge){idir*=-1;alive.forEach(i=>i.y+=12);idelay=Math.max(5,idelay-1);}
}

if(victoryTimer===0&&fc%Math.max(20,60-level*5)===0&&alive.length>0){
const s=alive[Math.floor(Math.random()*alive.length)];
ebullets.push({x:s.x+12,y:s.y+s.h});
}

utimer++;
if(victoryTimer===0&&utimer>600&&!ufo){ufo={x:-50,y:20};utimer=0;startUfoSound();}
if(ufo){ufo.x+=2;if(ufo.x>530)ufo=null;}

bullets.forEach((b,bi)=>{
alive.forEach(inv=>{
if(b.x>inv.x&&b.x<inv.x+inv.w&&b.y>inv.y&&b.y<inv.y+inv.h){
inv.alive=false;bullets.splice(bi,1);
const p=inv.t===3?30:inv.t===2?20:10;addScore(p);playExplosion();spawnPowerUp(inv);
exps.push({x:inv.x+14,y:inv.y+10,life:20,c:inv.t===3?'#f0f':inv.t===2?'#0f0':'#ff0'});
}
});
if(ufo&&b.x>ufo.x&&b.x<ufo.x+40&&b.y>ufo.y&&b.y<ufo.y+14){
addScore(100+Math.floor(Math.random()*200));playExplosion();
exps.push({x:ufo.x+20,y:ufo.y+7,life:20,c:'#f00'});
ufo=null;bullets.splice(bi,1);
}
});

bullets.forEach((b,bi)=>{
shields.forEach(sh=>sh.forEach(bl=>{
if(!bl.alive)return;
if(b.x+3>bl.x&&b.x<bl.x+5&&b.y+12>bl.y&&b.y<bl.y+5){bl.alive=false;bullets.splice(bi,1);}
}));
});

powerups.forEach((p,pi)=>{
if(p.x+12>player.x&&p.x<player.x+36&&p.y+12>player.y&&p.y<player.y+20){
activatePowerUp(p.type);
powerups.splice(pi,1);
updateHUD();
}
});

ebullets.forEach((b,bi)=>{
shields.forEach(sh=>sh.forEach(bl=>{
if(!bl.alive)return;
if(b.x+3>bl.x&&b.x<bl.x+5&&b.y+10>bl.y&&b.y<bl.y+5){bl.alive=false;ebullets.splice(bi,1);}
}));
if(b.x+3>player.x&&b.x<player.x+36&&b.y+10>player.y&&b.y<player.y+20){
if(player.shieldTimer>0){
player.shieldTimer=Math.max(0,player.shieldTimer-SHIELD_HIT_DEPLETION);
exps.push({x:b.x,y:b.y,life:14,c:'#7fffd4'});
}else{
lives--;
exps.push({x:player.x+18,y:player.y+10,life:20,c:'#0ff'});
playPlayerDeath();vibrateDeath();
if(lives<=0){updateHUD();gameOver();return;}
}
ebullets.splice(bi,1);
updateHUD();
}
});

alive.forEach(i=>{if(i.y+i.h>=465)gameOver();});
if(invaders.every(i=>!i.alive)&&victoryTimer===0){
victoryTimer=VICTORY_ANIMATION_FRAMES;ebullets=[];bullets=[];ufo=null;
playTone('triangle',VICTORY_TONE.freq,VICTORY_TONE.dur,VICTORY_TONE.vol,VICTORY_TONE.slide);
}
if(victoryTimer>0){
if(fc%6===0)exps.push({x:80+Math.random()*320,y:120+Math.random()*180,life:18,c:['#0ff','#ff0','#f0f'][Math.floor(Math.random()*3)]});
ctx.globalAlpha=0.6+Math.sin(fc*0.2)*0.4;
ctx.fillStyle='#ff0';ctx.font='bold 34px monospace';ctx.textAlign='center';ctx.fillText('VITÓRIA!',240,235);
ctx.globalAlpha=1;
victoryTimer--;
if(victoryTimer===0){
level++;
showLevelTransition(level,()=>{initLevel();running=true;gameLoop();});
running=false;
return;
}
}

exps=exps.filter(e=>e.life>0);exps.forEach(e=>e.life--);

shields.forEach(sh=>sh.forEach(b=>{if(b.alive){ctx.fillStyle='#0f0';ctx.fillRect(b.x,b.y,5,5);}}));
invaders.forEach(inv=>{if(!inv.alive)return;
const{x,y,t,f}=inv;
ctx.shadowBlur=6;
if(t===3){ctx.fillStyle='#f0f';ctx.shadowColor='#f0f';}
else if(t===2){ctx.fillStyle='#0f0';ctx.shadowColor='#0f0';}
else{ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';}
ctx.fillRect(x+4,y,20,4);ctx.fillRect(x,y+4,28,8);ctx.fillRect(x+4,y+12,6,4);ctx.fillRect(x+18,y+12,6,4);
if(f===0){ctx.fillRect(x,y+8,4,4);ctx.fillRect(x+24,y+8,4,4);}
else{ctx.fillRect(x+2,y+12,4,4);ctx.fillRect(x+22,y+12,4,4);}
ctx.shadowBlur=0;});

if(ufo){ctx.fillStyle='#f00';ctx.shadowBlur=10;ctx.shadowColor='#f00';
ctx.fillRect(ufo.x+10,ufo.y,20,4);ctx.fillRect(ufo.x+4,ufo.y+4,32,8);ctx.fillRect(ufo.x,ufo.y+8,40,6);
ctx.shadowBlur=0;}

ctx.fillStyle='#0ff';ctx.shadowBlur=8;ctx.shadowColor='#0ff';
bullets.forEach(b=>ctx.fillRect(b.x,b.y,3,12));
ctx.fillStyle='#f66';ctx.shadowColor='#f66';
ebullets.forEach(b=>ctx.fillRect(b.x,b.y,3,10));
ctx.shadowBlur=0;

powerups.forEach(p=>{
ctx.shadowBlur=10;ctx.shadowColor=p.type==='double'?'#0ff':'#7fffd4';
ctx.fillStyle=p.type==='double'?'#0ff':'#7fffd4';
ctx.fillRect(p.x,p.y,12,12);
ctx.fillStyle='#000';ctx.font='bold 10px monospace';ctx.textAlign='center';
ctx.fillText(p.type==='double'?'2':'S',p.x+6,p.y+9);
ctx.shadowBlur=0;
});

ctx.fillStyle='#0ff';ctx.shadowBlur=8;ctx.shadowColor='#0ff';
ctx.fillRect(player.x+15,player.y,6,5);ctx.fillRect(player.x+10,player.y+5,16,5);ctx.fillRect(player.x,player.y+10,36,10);
if(player.shieldTimer>0){
ctx.strokeStyle='#7fffd4';ctx.lineWidth=2;ctx.shadowColor='#7fffd4';ctx.shadowBlur=10;
ctx.beginPath();ctx.arc(player.x+18,player.y+10,24,0,Math.PI*2);ctx.stroke();
}
ctx.shadowBlur=0;

exps.forEach(e=>{
ctx.globalAlpha=e.life/20;ctx.fillStyle=e.c;ctx.shadowBlur=15;ctx.shadowColor=e.c;
for(let i=0;i<8;i++){const a=i/8*Math.PI*2,r=(20-e.life)*1.5;ctx.fillRect(e.x+Math.cos(a)*r-2,e.y+Math.sin(a)*r-2,4,4);}
ctx.globalAlpha=1;ctx.shadowBlur=0;});
}

function gameOver(){
if(!running)return;
running=false;cancelAnimationFrame(animId);
if(score>highScore){highScore=score;saveHighScore();}
recordLeaderboard(score);
playGameOver();
vibrateGameOver();
renderEndOverlay(false);
startIntroAnimation();
}

document.addEventListener('keydown',e=>{initAudio();keys[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
const lb=document.getElementById('lb'),rb=document.getElementById('rb'),fb=document.getElementById('fb');
lb.addEventListener('touchstart',e=>{initAudio();e.preventDefault();keys['ArrowLeft']=true;});
lb.addEventListener('touchend',e=>{e.preventDefault();keys['ArrowLeft']=false;});
rb.addEventListener('touchstart',e=>{initAudio();e.preventDefault();keys['ArrowRight']=true;});
rb.addEventListener('touchend',e=>{e.preventDefault();keys['ArrowRight']=false;});
fb.addEventListener('touchstart',e=>{initAudio();e.preventDefault();fpress=true;});
fb.addEventListener('touchend',e=>{e.preventDefault();fpress=false;});
lb.addEventListener('mousedown',()=>{initAudio();keys['ArrowLeft']=true;});lb.addEventListener('mouseup',()=>keys['ArrowLeft']=false);
rb.addEventListener('mousedown',()=>{initAudio();keys['ArrowRight']=true;});rb.addEventListener('mouseup',()=>keys['ArrowRight']=false);
fb.addEventListener('mousedown',()=>{initAudio();fpress=true;});fb.addEventListener('mouseup',()=>fpress=false);

renderStartOverlay();
startIntroAnimation();
</script>
</body>
</html>
